<!DOCTYPE html>
<html>
<head>
    <title>PMS Login</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Custom Modern UI -->
    <link href="{{ url_for('static', filename='custom.css') }}" rel="stylesheet">

    <style>
        .login-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            width: 100%;
            max-width: 380px;
            padding: 24px 24px 20px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            animation: slideUpFade 0.7s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .logo {
            width: 50px;
            display: block;
            margin: 0 auto 10px;
            border-radius: 10px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.08);
        }

        /* Demo divider */
        .demo-divider {
            position: relative;
            text-align: center;
            margin: 18px 0 12px;
        }
        .demo-divider::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #e2e8f0;
            z-index: 1;
        }
        .demo-divider-text {
            position: relative;
            z-index: 2;
            background: #ffffff;
            padding: 0 12px;
            color: #94a3b8;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1.2px;
            text-transform: uppercase;
        }

        /* Demo Account Cards */
        .demo-account-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            margin-bottom: 8px;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            user-select: none;
        }

        .demo-account-card:hover {
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.02);
            transform: translateY(-1px);
        }

        /* Specific Hover Styles */
        .demo-account-card.admin-card:hover {
            border-color: #fca5a5;
            background-color: #fffafb;
        }
        .demo-account-card.manager-card:hover {
            border-color: #fcd34d;
            background-color: #fffdf6;
        }
        .demo-account-card.employee-card:hover {
            border-color: #93c5fd;
            background-color: #f7faff;
        }

        /* Icon Container styling */
        .demo-icon-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        /* Admin Icon */
        .admin-icon {
            background-color: #fef2f2;
            border: 1px solid #fee2e2;
            color: #ef4444;
        }
        /* Manager Icon */
        .manager-icon {
            background-color: #fffbeb;
            border: 1px solid #fef3c7;
            color: #d97706;
        }
        /* Employee Icon */
        .employee-icon {
            background-color: #f0fdf4;
            border: 1px solid #dcfce7;
            color: #10b981;
        }

        /* Label and Text styles */
        .demo-role {
            font-size: 13px;
            font-weight: 700;
            color: #0f172a;
            line-height: 1.2;
        }
        .demo-email {
            font-size: 11px;
            color: #64748b;
            line-height: 1.2;
        }

        /* Use -> text link button style */
        .demo-use-btn {
            font-size: 12px;
            font-weight: 600;
            color: #64748b;
            transition: all 0.2s ease;
        }

        /* Action/Link Colors on Card Hover */
        .demo-account-card.admin-card:hover .demo-use-btn {
            color: #ef4444;
        }
        .demo-account-card.manager-card:hover .demo-use-btn {
            color: #d97706;
        }
        .demo-account-card.employee-card:hover .demo-use-btn {
            color: #2563eb;
        }

        /* Shared Password text badge styling */
        .shared-password-info {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-top: 14px;
            color: #64748b;
            font-size: 12px;
        }
        .password-badge {
            background-color: #f1f5f9;
            color: #334155;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            padding: 1px 6px;
            font-family: monospace;
            font-size: 11px;
            font-weight: 600;
        }
    </style>
</head>

<body>

<div class="login-wrapper">
    <div class="login-card">

        <!-- LOGO -->
        <img src="{{ url_for('static', filename='img1.jpg') }}" class="logo">

        <h4 class="text-center mb-3 fw-bold" style="color: #0f172a; letter-spacing: -0.5px; font-size: 20px;">PMS</h4>

        <form method="POST" action="/login">

            <div class="mb-2">
                <label class="form-label mb-1" style="font-size: 13px;"><i class="fa-solid fa-envelope text-primary me-1"></i> Email</label>
                <input type="text" name="email" class="form-control" style="padding: 8px 12px; font-size: 13.5px;" placeholder="Enter email" required>
            </div>

            <div class="mb-3">
                <label class="form-label mb-1" style="font-size: 13px;"><i class="fa-solid fa-lock text-primary me-1"></i> Password</label>
                <input type="password" name="password" class="form-control" style="padding: 8px 12px; font-size: 13.5px;" placeholder="Enter password" required>
            </div>

            <button class="btn btn-primary w-100 fw-bold" style="padding: 10px; font-size: 15px;">
                Secure Login <i class="fa-solid fa-arrow-right ms-2"></i>
            </button>

        </form>

        <!-- OR TRY A DEMO ACCOUNT -->
        <div class="demo-divider">
            <span class="demo-divider-text">Or try a demo account</span>
        </div>

        <div class="demo-account-list">
            <!-- Admin -->
            <div class="demo-account-card admin-card" onclick="useDemoAccount('admin@gmail.com')">
                <div class="d-flex align-items-center">
                    <div class="demo-icon-wrapper admin-icon me-3">
                        <i class="fa-solid fa-shield-halved"></i>
                    </div>
                    <div class="text-start">
                        <div class="demo-role">Admin</div>
                        <div class="demo-email">admin@gmail.com</div>
                    </div>
                </div>
                <div class="demo-use-btn">Use &rarr;</div>
            </div>

            <!-- Manager -->
            <div class="demo-account-card manager-card" onclick="useDemoAccount('mgr@gmail.com')">
                <div class="d-flex align-items-center">
                    <div class="demo-icon-wrapper manager-icon me-3">
                        <i class="fa-solid fa-briefcase"></i>
                    </div>
                    <div class="text-start">
                        <div class="demo-role">Manager</div>
                        <div class="demo-email">mgr@gmail.com</div>
                    </div>
                </div>
                <div class="demo-use-btn">Use &rarr;</div>
            </div>

            <!-- Employee -->
            <div class="demo-account-card employee-card" onclick="useDemoAccount('riya@example.com')">
                <div class="d-flex align-items-center">
                    <div class="demo-icon-wrapper employee-icon me-3">
                        <i class="fa-solid fa-user"></i>
                    </div>
                    <div class="text-start">
                        <div class="demo-role">Employee</div>
                        <div class="demo-email">riya@example.com</div>
                    </div>
                </div>
                <div class="demo-use-btn">Use &rarr;</div>
            </div>
        </div>

        <!-- Shared password badge -->
        <div class="shared-password-info">
            <i class="fa-solid fa-key"></i>
            <span>Shared password for demos:</span>
            <span class="password-badge">123</span>
        </div>

    </div>
</div>

<script>
function useDemoAccount(email) {
    const emailInput = document.querySelector('input[name="email"]');
    const passwordInput = document.querySelector('input[name="password"]');
    
    emailInput.value = email;
    passwordInput.value = '123';
    
    // Visual flash feedback on inputs
    emailInput.style.backgroundColor = '#e0f2fe';
    passwordInput.style.backgroundColor = '#e0f2fe';
    
    setTimeout(() => {
        document.querySelector('form').submit();
    }, 150);
}
</script>
</body>
</html>
